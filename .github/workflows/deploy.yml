name: Deploy

# ---------------------------------------------------------------------------
# Runs on push to main.  Infrastructure is provisioned once via deploy.ps1;
# this workflow only deploys code changes (container images) and agent
# definition changes.  Guidelines are re-seeded only when data files change.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]

env:
  TF_STATE_RG: rg-tfstate-brnd

jobs:
  # ---------------------------------------------------------------------------
  # Detect which components changed so we can skip unnecessary jobs
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api:        ${{ steps.filter.outputs.api }}
      ui:         ${{ steps.filter.outputs.ui }}
      agents:     ${{ steps.filter.outputs.agents }}
      guidelines: ${{ steps.filter.outputs.guidelines }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/services/brandsense-api/**'
            ui:
              - 'apps/ui/**'
            agents:
              - 'agents/**'
            guidelines:
              - 'scripts/load/data/**'
              - 'scripts/load/guidelines.py'
              - 'scripts/load/requirements.txt'

  # ---------------------------------------------------------------------------
  # Read Terraform outputs (read-only — no apply)
  # ---------------------------------------------------------------------------
  read-infra:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      resource_group_name:          ${{ steps.tf-out.outputs.resource_group_name }}
      container_registry_server:    ${{ steps.tf-out.outputs.container_registry_server }}
      container_app_name:           ${{ steps.tf-out.outputs.container_app_name }}
      container_app_ui_name:        ${{ steps.tf-out.outputs.container_app_ui_name }}
      container_app_url:            ${{ steps.tf-out.outputs.container_app_url }}
      search_endpoint:              ${{ steps.tf-out.outputs.search_endpoint }}
      ai_project_endpoint:          ${{ steps.tf-out.outputs.ai_project_endpoint }}
      key_vault_name:               ${{ steps.tf-out.outputs.key_vault_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Derive TF state storage name
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          SUFFIX=${SUB_ID//-/}
          echo "TF_STATE_STORAGE=stotfbrnd${SUFFIX:0:8}" >> $GITHUB_ENV
      - name: Terraform init (read-only)
        working-directory: infra
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}"
      - name: Read Terraform outputs
        id: tf-out
        working-directory: infra
        run: |
          echo "resource_group_name=$(terraform output -raw resource_group_name)"            >> $GITHUB_OUTPUT
          echo "container_registry_server=$(terraform output -raw container_registry_login_server)" >> $GITHUB_OUTPUT
          echo "container_app_name=$(terraform output -raw container_app_name)"              >> $GITHUB_OUTPUT
          echo "container_app_ui_name=$(terraform output -raw container_app_ui_name)"        >> $GITHUB_OUTPUT
          echo "container_app_url=$(terraform output -raw container_app_url)"                >> $GITHUB_OUTPUT
          echo "search_endpoint=$(terraform output -raw search_service_endpoint)"            >> $GITHUB_OUTPUT
          echo "ai_project_endpoint=$(terraform output -raw ai_project_endpoint)"            >> $GITHUB_OUTPUT
          echo "key_vault_name=$(terraform output -raw key_vault_name)"                      >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build & push API image, then update Container App
  # ---------------------------------------------------------------------------
  deploy-api:
    if: needs.changes.outputs.api == 'true'
    needs: [changes, read-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build & push API image
        run: |
          az acr build \
            --registry ${{ needs.read-infra.outputs.container_registry_server }} \
            --image brnd-api:${{ github.sha }} \
            --file apps/services/brandsense-api/Dockerfile .
      - name: Update API Container App
        run: |
          az containerapp update \
            --name  ${{ needs.read-infra.outputs.container_app_name }} \
            --resource-group ${{ needs.read-infra.outputs.resource_group_name }} \
            --image "${{ needs.read-infra.outputs.container_registry_server }}/brnd-api:${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Build & push UI image, then update Container App
  # ---------------------------------------------------------------------------
  deploy-ui:
    if: needs.changes.outputs.ui == 'true'
    needs: [changes, read-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build & push UI image
        run: |
          az acr build \
            --registry ${{ needs.read-infra.outputs.container_registry_server }} \
            --image brnd-ui:${{ github.sha }} \
            --file apps/ui/Dockerfile \
            apps/ui
      - name: Update UI Container App
        run: |
          az containerapp update \
            --name  ${{ needs.read-infra.outputs.container_app_ui_name }} \
            --resource-group ${{ needs.read-infra.outputs.resource_group_name }} \
            --image "${{ needs.read-infra.outputs.container_registry_server }}/brnd-ui:${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Re-seed AI Search guidelines (only when data files change)
  # ---------------------------------------------------------------------------
  seed-guidelines:
    if: needs.changes.outputs.guidelines == 'true'
    needs: [changes, read-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/load/requirements.txt
      - name: Seed guidelines index
        env:
          AZURE_SEARCH_ENDPOINT: ${{ needs.read-infra.outputs.search_endpoint }}
        run: python scripts/load/guidelines.py

  # ---------------------------------------------------------------------------
  # Deploy Foundry agents (only when agent definitions change)
  # ---------------------------------------------------------------------------
  deploy-agents:
    if: needs.changes.outputs.agents == 'true'
    needs: [changes, read-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r agents/requirements.txt
      - name: Deploy Foundry agents
        run: |
          python agents/deploy.py \
            --project-endpoint  "${{ needs.read-infra.outputs.ai_project_endpoint }}" \
            --model-deployment  gpt-4.1 \
            --key-vault-name    "${{ needs.read-infra.outputs.key_vault_name }}" \
            --search-connection-name brandsense-search

  # ---------------------------------------------------------------------------
  # Smoke test (runs after any deploy job that executed)
  # ---------------------------------------------------------------------------
  validate:
    if: always() && !cancelled()
    needs: [read-infra, deploy-api, deploy-ui, seed-guidelines, deploy-agents]
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ needs.read-infra.outputs.container_app_url }}/health"
